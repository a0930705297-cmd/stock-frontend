<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瘜犖?餈質馱</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 12px;
  background: #f8f8f6;
  color: #1a1a1a;
  height: 100vh;
  overflow: hidden;
}

/* ?餃??*/
#loginPage {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  background: #f8f8f6;
}
.login-box {
  width: 280px;
  text-align: center;
}
.login-box h1 { font-size: 15px; font-weight: 500; margin-bottom: 4px; letter-spacing: 0.5px; }
.login-box p { font-size: 11px; color: #999; margin-bottom: 20px; }
.login-box input {
  width: 100%; padding: 8px 12px; font-size: 12px;
  border: 1px solid #ddd; border-radius: 4px;
  margin-bottom: 8px; background: #fff;
}
.login-box button {
  width: 100%; padding: 8px; font-size: 12px;
  border: 1px solid #1a1a1a; border-radius: 4px;
  background: #1a1a1a; color: #fff; cursor: pointer;
}
.login-box button:hover { background: #333; }
#loginError { font-size: 11px; color: #E24B4A; margin-top: 6px; }

/* 銝餌???*/
#mainPage {
  display: none;
  height: 100vh;
  overflow: hidden;
}

.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: 100vh;
  overflow: hidden;
}

/* 撌行? */
.left-panel {
  background: #fff;
  border-right: 1px solid #eee;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.left-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid #f0f0f0;
  flex-shrink: 0;
}
.left-header h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.3px; }
.left-header .server-status {
  display: flex; align-items: center; gap: 5px;
  margin-top: 4px; font-size: 10px; color: #999;
}
.status-dot { width: 5px; height: 5px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
.status-dot.green { background: #639922; }
.status-dot.red { background: #E24B4A; }

/* ?? */
.search-section {
  padding: 10px 12px;
  border-bottom: 1px solid #f0f0f0;
  flex-shrink: 0;
}
.search-row { display: flex; gap: 5px; margin-bottom: 6px; }
.search-row input {
  flex: 1; padding: 6px 8px; font-size: 11px;
  border: 1px solid #e0e0e0; border-radius: 3px; background: #fafafa;
}
.search-row input:focus { outline: none; border-color: #999; background: #fff; }
.search-row button {
  padding: 6px 10px; font-size: 11px;
  border: 1px solid #e0e0e0; border-radius: 3px;
  background: #1a1a1a; color: #fff; cursor: pointer;
}
.quick-picks { display: flex; flex-wrap: wrap; gap: 4px; }
.qp {
  padding: 2px 8px; font-size: 10px;
  border: 1px solid #e8e8e8; border-radius: 2px;
  cursor: pointer; color: #666; background: #fff;
}
.qp:hover { background: #f5f5f5; color: #1a1a1a; }

/* 撌行??脣?? */
.left-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}
.left-scroll::-webkit-scrollbar { width: 3px; }
.left-scroll::-webkit-scrollbar-track { background: transparent; }
.left-scroll::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

/* 撌行??憛?*/
.left-section {
  border-bottom: 1px solid #f0f0f0;
  padding: 8px 12px;
}
.left-section-title {
  font-size: 10px; font-weight: 600;
  color: #999; letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 6px;
  display: flex; justify-content: space-between; align-items: center;
}
.left-section-title span { cursor: pointer; color: #bbb; font-size: 10px; }
.left-section-title span:hover { color: #666; }

/* ??皜 */
.watch-add { display: flex; gap: 4px; margin-bottom: 6px; }
.watch-add input {
  flex: 1; padding: 4px 6px; font-size: 10px;
  border: 1px solid #e0e0e0; border-radius: 2px; background: #fafafa;
}
.watch-add button {
  padding: 4px 8px; font-size: 10px;
  border: 1px solid #e0e0e0; border-radius: 2px;
  background: #fff; cursor: pointer;
}
.watch-item {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 6px; border-radius: 2px;
  margin-bottom: 2px; font-size: 10px;
  background: #fafafa; border: 1px solid #f0f0f0;
}
.watch-item.alert { background: #fff8f8; border-color: #ffd5d5; }
.watch-item.safe  { background: #f8fff5; border-color: #d5f0d5; }
.watch-item.below { background: #f8f8ff; border-color: #d0d0f0; }  /* 頝? */
.watch-item.ready { background: #fffdf0; border-color: #f0e8b0; }  /* ??銝?*/
.wi-code { font-weight: 600; min-width: 35px; font-family: monospace; font-size: 10px; }
.wi-name { flex: 1; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.wi-badge {
  font-size: 9px; padding: 1px 4px; border-radius: 2px;
  white-space: nowrap;
}
.wi-badge.alert   { background: #E24B4A; color: #fff; }
.wi-badge.safe    { background: #639922; color: #fff; }
.wi-badge.below   { background: #7070C0; color: #fff; }
.wi-badge.ready   { background: #C08820; color: #fff; }
.wi-badge.loading { background: #eee; color: #999; }
.wi-remove { color: #ccc; cursor: pointer; font-size: 10px; flex-shrink: 0; }
.wi-remove:hover { color: #E24B4A; }

/* ?啗?皜 */
.news-item {
  display: flex; gap: 6px; align-items: flex-start;
  padding: 4px 0; border-bottom: 1px solid #f5f5f5;
}
.news-item:last-child { border-bottom: none; }
.news-date { font-size: 9px; color: #bbb; white-space: nowrap; min-width: 55px; padding-top: 1px; }
.news-title {
  font-size: 10px; color: #333; text-decoration: none; line-height: 1.4;
}
.news-title:hover { color: #1a1a1a; }

/* ??? */
.scan-controls { display: flex; gap: 4px; margin-bottom: 6px; }
.scan-controls select {
  flex: 1; padding: 4px 6px; font-size: 10px;
  border: 1px solid #e0e0e0; border-radius: 2px; background: #fafafa;
}
.scan-controls button {
  padding: 4px 8px; font-size: 10px;
  border: 1px solid #e0e0e0; border-radius: 2px;
  background: #fff; cursor: pointer; white-space: nowrap;
}
.scan-controls button:disabled { color: #bbb; }
.scan-item {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 6px; border-radius: 2px;
  margin-bottom: 2px; font-size: 10px;
  background: #fafafa; border: 1px solid #f0f0f0;
  cursor: pointer; border-left: 2px solid #ddd;
}
.scan-item:hover { background: #f0f0f0; }
.scan-item.good { border-left-color: #639922; }
.scan-item.ok { border-left-color: #378ADD; }
.scan-item.warning { border-left-color: #E09020; }
.scan-item.danger { border-left-color: #E24B4A; }
.scan-item.neutral { border-left-color: #bbb; }
.si-code { font-family: monospace; font-weight: 600; min-width: 35px; font-size: 10px; }
.si-name { flex: 1; color: #555; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.si-price { font-family: monospace; font-size: 10px; }
.si-zone {
  font-size: 9px; padding: 1px 4px; border-radius: 2px;
  white-space: nowrap;
}
.si-zone.good { background: #eaf3de; color: #3B6D11; }
.si-zone.ok { background: #e8f0fb; color: #185FA5; }
.si-zone.warning { background: #fdf0e0; color: #854F0B; }
.si-zone.danger { background: #fcebeb; color: #A32D2D; }
.si-zone.neutral { background: #f0f0f0; color: #666; }

/* ?銵???*/
.tech-item {
  padding: 5px 6px; border-radius: 2px;
  margin-bottom: 2px; font-size: 10px;
  background: #fafafa; border: 1px solid #f0f0f0;
  cursor: pointer; border-left: 2px solid #639922;
}
.tech-item:hover { background: #f0f0f0; }
.tech-item-top { display: flex; align-items: center; gap: 5px; margin-bottom: 2px; }
.tech-tag { font-size: 9px; padding: 0px 3px; border-radius: 2px; }
.tech-tag.bull { background: #eaf3de; color: #3B6D11; }
.tech-tag.obv { background: #e8f0fb; color: #185FA5; }
.tech-item-detail { font-size: 9px; color: #999; line-height: 1.5; }
.tech-zone { font-size: 9px; padding: 1px 4px; border-radius: 2px; margin-left: 3px; }

/* ?單? */
.right-panel {
  background: #f8f8f6;
  overflow-y: auto;
  height: 100vh;
  padding: 14px 16px;
}
.right-panel::-webkit-scrollbar { width: 4px; }
.right-panel::-webkit-scrollbar-track { background: transparent; }
.right-panel::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

/* 蝛箇???*/
.empty-state {
  display: flex; align-items: center; justify-content: center;
  height: 60%;  flex-direction: column; gap: 8px;
  color: #ccc;
}
.empty-state p { font-size: 11px; }

/* ?∠巨璅? */
.stock-header {
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 12px;
}
.stock-name { font-size: 16px; font-weight: 600; }
.stock-code { font-size: 11px; color: #999; font-family: monospace; }
.stock-price { font-size: 16px; font-weight: 600; font-family: monospace; margin-left: auto; }

/* ?拇?蝬脫 */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }

/* ?∠? */
.card {
  background: #fff; border: 1px solid #eee; border-radius: 4px;
  padding: 10px 12px; margin-bottom: 10px;
}
.card-title {
  font-size: 10px; font-weight: 600; color: #999;
  letter-spacing: 0.6px; text-transform: uppercase;
  margin-bottom: 8px;
}

/* ?? */
.metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
.metric {
  background: #fff; border: 1px solid #eee; border-radius: 3px;
  padding: 8px 10px;
}
.metric-label { font-size: 9px; color: #999; margin-bottom: 3px; letter-spacing: 0.3px; }
.metric-value { font-size: 14px; font-weight: 600; font-family: monospace; }
.metric-value.up { color: #E24B4A; }
.metric-value.down { color: #1D9E75; }
.metric-sub { font-size: 9px; color: #bbb; margin-top: 2px; }

/* 瘜Ｘ挾撖Ⅳ */
.password-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 8px; }
.pw-box {
  border-radius: 3px; padding: 8px 10px;
  position: relative;
}
.pw-box.q1 { background: #f5fbee; border: 1px solid #d5eab5; }
.pw-box.q2 { background: #eef5fc; border: 1px solid #b5d4f0; }
.pw-box.q3 { background: #fdf6ee; border: 1px solid #f0d5a0; }
.pw-box.q4 { background: #fdf0ee; border: 1px solid #f0b5b0; }
.pw-box.active { outline: 1.5px solid #1a1a1a; }
.pw-label { font-size: 9px; color: #888; margin-bottom: 3px; }
.pw-value { font-size: 13px; font-weight: 600; font-family: monospace; }
.pw-mult { font-size: 9px; color: #bbb; margin-top: 2px; }

/* 雿??文? */
.verdict {
  border-radius: 3px; padding: 8px 10px;
  margin-bottom: 10px;
}
.verdict.danger { background: #fff5f5; border: 1px solid #fdd; }
.verdict.warning { background: #fffaf0; border: 1px solid #fde; }
.verdict.ok { background: #f0f6ff; border: 1px solid #d0e4f8; }
.verdict.good { background: #f5fbee; border: 1px solid #d5eab5; }
.verdict.neutral { background: #f8f8f8; border: 1px solid #eee; }
.verdict-title { font-size: 10px; font-weight: 600; margin-bottom: 2px; }
.verdict-desc { font-size: 10px; color: #555; line-height: 1.5; }

/* ??蝝?*/
.four-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.four-item {
  background: #fafafa; border: 1px solid #eee; border-radius: 3px;
  padding: 7px 9px;
}
.four-label { font-size: 9px; color: #999; margin-bottom: 3px; }
.four-value { font-size: 10px; font-weight: 500; }
.four-value.pass { color: #639922; }
.four-value.fail { color: #E24B4A; }

/* 蝢 */
.us-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 6px; }
.us-card {
  background: #fafafa; border: 1px solid #eee; border-radius: 3px;
  padding: 7px 9px;
}
.us-ticker { font-size: 11px; font-weight: 600; font-family: monospace; }
.us-name { font-size: 9px; color: #999; margin-bottom: 4px; }
.us-price { font-size: 12px; font-weight: 600; font-family: monospace; }
.us-change { font-size: 10px; font-family: monospace; }
.us-signal { font-size: 9px; padding: 1px 4px; border-radius: 2px; margin-top: 3px; display: inline-block; }
.signal-up { background: #fff0f0; color: #E24B4A; }
.signal-down { background: #f0fff0; color: #1D9E75; }

/* 銝駁?璅惜 */
.theme-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.theme-tag {
  padding: 2px 7px; font-size: 10px; border-radius: 2px;
  background: #f0f5ff; color: #378ADD; border: 1px solid #d0e4f8;
}

/* ?” */
.chart-wrap { position: relative; width: 100%; height: 150px; margin-bottom: 6px; }
.chart-legend { display: flex; gap: 12px; margin-bottom: 6px; font-size: 10px; color: #999; }
.legend-dot { width: 8px; height: 8px; border-radius: 1px; display: inline-block; margin-right: 3px; }

/* 銵冽 */
.data-table { width: 100%; border-collapse: collapse; font-size: 10px; }
.data-table th {
  padding: 4px 8px; text-align: right; font-size: 9px;
  font-weight: 400; color: #999; border-bottom: 1px solid #eee;
}
.data-table th:first-child { text-align: left; }
.data-table td {
  padding: 4px 8px; text-align: right; font-family: monospace;
  border-bottom: 1px solid #f5f5f5;
}
.data-table td:first-child { text-align: left; font-family: sans-serif; color: #888; }
.data-table tbody tr:last-child td { border-bottom: none; }
.data-table tbody tr:hover td { background: #fafafa; }
td.pos { color: #E24B4A; }
td.neg { color: #1D9E75; }
.rev-up { color: #E24B4A; }
.rev-down { color: #1D9E75; }

/* AI ?? */
.analysis-body { font-size: 11px; color: #333; line-height: 1.7; white-space: pre-wrap; }
.analysis-btn {
  padding: 4px 12px; font-size: 10px;
  border: 1px solid #ddd; border-radius: 2px;
  background: #fff; cursor: pointer; float: right;
}
.analysis-btn:hover { background: #f5f5f5; }
.analysis-btn:disabled { color: #bbb; cursor: not-allowed; }

/* ? */
.section-divider {
  font-size: 10px; font-weight: 600; color: #bbb;
  letter-spacing: 0.6px; text-transform: uppercase;
  margin: 12px 0 8px;
  display: flex; align-items: center; gap: 8px;
}
.section-divider::after {
  content: ''; flex: 1; height: 1px; background: #eee;
}
.label-blue { background: #378ADD; color: #fff; padding: 1px 5px; border-radius: 2px; font-size: 9px; }
.label-orange { background: #E09020; color: #fff; padding: 1px 5px; border-radius: 2px; font-size: 9px; }
.note-text { font-size: 9px; color: #bbb; line-height: 1.6; margin-top: 6px; }

/* ??霅衣內 */
.deviation-bar {
  border-radius: 3px; padding: 8px 12px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.deviation-bar.danger  { background: #fff0f0; border: 1px solid #f5c0c0; }
.deviation-bar.warning { background: #fffaf0; border: 1px solid #f5dfa0; }
.deviation-bar.safe    { background: #f0fff5; border: 1px solid #b5e8c8; }
.dev-icon  { font-size: 16px; flex-shrink: 0; }
.dev-body  { flex: 1; }
.dev-title { font-size: 11px; font-weight: 600; margin-bottom: 2px; }
.dev-desc  { font-size: 10px; color: #555; line-height: 1.5; }
.dev-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.dev-badge {
  font-size: 9px; padding: 2px 7px; border-radius: 2px;
  font-family: monospace;
}
.dev-badge.red  { background: #fde; color: #A32D2D; border: 1px solid #f5c0c0; }
.dev-badge.orange { background: #fdf0e0; color: #854F0B; border: 1px solid #f5dfa0; }
.dev-badge.green  { background: #eaf3de; color: #3B6D11; border: 1px solid #c5e0a0; }

/* ????? */
.link-btn {
  padding: 3px 10px; font-size: 10px;
  border-radius: 2px; cursor: pointer;
  text-decoration: none; display: inline-flex;
  align-items: center; gap: 3px;
  transition: all 0.15s;
}
.link-btn-blue {
  border: 1px solid #378ADD; background: #e8f0fb; color: #185FA5;
}
.link-btn-blue:hover { background: #378ADD; color: #fff; }
.link-btn-green {
  border: 1px solid #639922; background: #eaf3de; color: #3B6D11;
}
.link-btn-green:hover { background: #639922; color: #fff; }
.loading-text { font-size: 11px; color: #bbb; text-align: center; padding: 20px; }
.empty-text { font-size: 10px; color: #bbb; text-align: center; padding: 8px; }
</style>
</head>

let charts = {};
function calcCost(rows) {
  let holdings = 0, totalCost = 0;
  const history = [];
  for (const d of rows) {
    if (d.buy > 0) { totalCost += d.buy * 1000 * d.close; holdings += d.buy * 1000; }
    if (d.sell > 0 && holdings > 0) {
      const s = Math.min(d.sell * 1000, holdings);
      totalCost -= s * (totalCost / holdings);
      holdings -= s;
    }
    if (holdings > 0) history.push({
      date: d.date, label: d.date.slice(4),
      cost: totalCost / holdings, price: d.close,
      holdings: Math.round(holdings / 1000),
      buy: d.buy, sell: d.sell
    });
  }
  return history;
}

function mergeForeignWithPrice(foreignData, priceMap) {
  return foreignData.map(d => {
    const p = priceMap[d.date];
    return p ? { ...d, close: p.close } : null;
  }).filter(Boolean);
}

function mergeMarginWithPrice(marginData, priceMap) {
  return marginData.map(m => {
    const parts = m.date.split('/');
    if (parts.length !== 3) {
      const p = priceMap[m.date];
      return p ? { ...m, close: p.close } : null;
    }
    const dateKey = `${parseInt(parts[0]) + 1911}${parts[1]}${parts[2]}`;
    const p = priceMap[dateKey];
    return p ? { ...m, date: dateKey, close: p.close } : null;
  }).filter(Boolean);
}

function calcPassword(cost, price) {
  const p1 = cost * 1.04, p2 = cost * 1.2, p3 = cost * 1.4, p4 = cost * 1.7;
  let zone, verdict, css;
  if (price < cost) { zone = `< ? ${cost.toFixed(1)}`; verdict = '???湔??研??潭?鈭箸鞎函?湔?撘勗???; css = 'neutral'; }
  else if (price < p1) { zone = `?嚚?? ${p1.toFixed(1)}`; verdict = '??????芣迤撘??敺?蝛拍????; css = 'neutral'; }
  else if (price < p2) { zone = `?澆?暺?蝚砌?瘜?${p2.toFixed(1)}`; verdict = '?洵銝?餅???歇?澆?嚗?蝚砌?瘜ａ?暺??脯?; css = 'good'; }
  else if (price < p3) { zone = `蝚砌?瘜ｇ?蝚砌?瘜?${p3.toFixed(1)}`; verdict = '?洵鈭????函洵銝瘜Ｗ????迤?洵鈭郭?脯?; css = 'ok'; }
  else if (price < p4) { zone = `蝚砌?瘜ｇ??剛?? ${p4.toFixed(1)}`; verdict = '?扔蝡舫?雿???孵歇??嚗??銝捏憸券??; css = 'warning'; }
  else { zone = `撌脤??剛?? ${p4.toFixed(1)} 隞乩?`; verdict = '???脣??歇??頞?璆菟?嚗惇?潭扔摨血?芸???; css = 'danger'; }
  return { p1, p2, p3, p4, zone, verdict, css };
}

function checkTrend(history) {
  if (history.length < 20) return { pass: false, text: '鞈?銝雲' };
  const recent = history.slice(-20).map(h => h.price);
  const a = recent.slice(0,10).reduce((a,b)=>a+b,0)/10;
  const b = recent.slice(10).reduce((a,b)=>a+b,0)/10;
  return { pass: b > a, text: b > a ? '憭韏啣 ?? : '?征韏啣' };
}

function checkAccumulate(history) {
  if (history.length < 5) return { pass: false, text: '鞈?銝雲' };
  const recent = history.slice(-10);
  const n = recent.filter(h => h.buy > h.sell).length;
  return { pass: n >= 6, text: `餈?0?亥眺頞?${n} 甈?{n >= 6 ? ' ?? : ''}` };
}

function makeChart(id, labels, datasets, costValue) {
  if (charts[id]) { charts[id].destroy(); }

}

async function loadNews() {
  document.getElementById('newsList').innerHTML = '<div class="empty-text">頛銝?..</div>';
  try {
    const res = await apiFetch(`${SERVER}/news`);
    const json = await res.json();
    const items = json.data || [];
    const toTWDate = d => { const tw = new Date(d.getTime()+8*3600000); return tw.toISOString().slice(0,10); };
    const today = new Date(), yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate()-1);
    const todayStr = toTWDate(today), yestStr = toTWDate(yesterday);
    const filtered = items.filter(item => { const s = toTWDate(new Date(item.pub_date)); return s===todayStr||s===yestStr; });
    if (!filtered.length) { document.getElementById('newsList').innerHTML = '<div class="empty-text">隞?怎?啗?</div>'; return; }
    document.getElementById('newsList').innerHTML = filtered.map(item => {
      const d = new Date(item.pub_date);
      const dateStr = toTWDate(d);
      const timeStr = d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Taipei'});
      const label = dateStr===todayStr?`隞?${timeStr}`:`??${timeStr}`;
      return `<div class="news-item"><span class="news-date">${label}</span><a class="news-title" href="${item.link}" target="_blank">${item.title.replace(' - 蝬??亙','')}</a></div>`;
    }).join('');
  } catch(e) { document.getElementById('newsList').innerHTML = '<div class="empty-text">頛憭望?</div>'; }
}

let watchlist = JSON.parse(localStorage.getItem('watchlist') || '[]');
function saveWatchlist() { localStorage.setItem('watchlist', JSON.stringify(watchlist)); }
function addWatch() {
  const code = document.getElementById('watchInput').value.trim();
  if (!code || watchlist.find(w=>w.code===code)) return;
  watchlist.push({ code, name:code, foreignCost:0, triggerPrice:0 });
  saveWatchlist();
  document.getElementById('watchInput').value = '';
  renderWatchlist();
  checkWatchItem(watchlist.length-1);
}
document.getElementById('watchInput').addEventListener('keydown', e => { if(e.key==='Enter') addWatch(); });
function removeWatch(i) { watchlist.splice(i,1); saveWatchlist(); renderWatchlist(); }
function renderWatchlist() {
  const c = document.getElementById('watchlistItems');
  if (!watchlist.length) { c.innerHTML = '<div class="empty-text">撠?啣???</div>'; return; }
  c.innerHTML = watchlist.map((w,i) => {
    const hasData   = w.currentPrice > 0;
    const fCost     = w.foreignCost  || 0;
    const trigger   = w.triggerPrice || 0;
    const price     = w.currentPrice || 0;

    // 銝??斗
    let cls, badge, badgeText;
    if (!hasData) {
      cls = ''; badge = 'loading'; badgeText = '頛銝?;
    } else if (fCost > 0 && price < fCost) {
      cls = 'below'; badge = 'below'; badgeText = '???湔???;
    } else if (trigger > 0 && price >= trigger) {
      cls = 'alert'; badge = 'alert'; badgeText = '?∠??渡??;
    } else if (fCost > 0 && price >= fCost) {
      cls = 'ready'; badge = 'ready'; badgeText = '?喲??銝?;
    } else {
      cls = 'safe'; badge = 'safe'; badgeText = '?像';
    }

    const costInfo = fCost > 0 ? ` ?$${fCost.toFixed(1)}` : '';
    const trigInfo = trigger > 0 ? ` ?澆?$${trigger.toFixed(1)}` : '';
    return `<div class="watch-item ${cls}">
      <span class="wi-code">${w.code}</span>
      <span class="wi-name">${w.name}${hasData?` $${price.toFixed(1)}`:''}${costInfo}${trigInfo}</span>
      <span class="wi-badge ${badge}">${badgeText}</span>
      <span class="wi-remove" onclick="removeWatch(${i})">??/span>
    </div>`;
  }).join('');
  document.getElementById('watchlistUpdated').textContent = `?湔 ${new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})}`;
}
async function checkWatchItem(i) {
  const w = watchlist[i];
  if (!w) return;
  try {
    const [priceRes, foreignRes, tickerRes] = await Promise.all([
      apiFetch(`${SERVER}/price/${w.code}`),
      apiFetch(`${SERVER}/foreign/${w.code}`),
      apiFetch(`${SERVER}/ticker/${w.code}`)
    ]);
    const priceJson = await priceRes.json();
    const foreignJson = await foreignRes.json();
    const tickerJson = await tickerRes.json();
    const priceMap = priceJson.data || {};
    const pv = Object.values(priceMap);
    const latestPrice = pv.length>0?pv[pv.length-1].close:0;
    const fRows = mergeForeignWithPrice(foreignJson.data||[], priceMap);
    const fHistory = calcCost(fRows);
    const fCost = fHistory.length>0?fHistory[fHistory.length-1].cost:0;
    w.name = tickerJson.name || w.code;
    w.currentPrice = latestPrice;
    w.foreignCost = fCost;
    w.triggerPrice = fCost*1.04;
    saveWatchlist();
    renderWatchlist();
  } catch(e) {}
}
async function refreshWatchlist() { for(let i=0;i<watchlist.length;i++) await checkWatchItem(i); }

  const results = document.getElementById('chipResults');
  const dateEl = document.getElementById('chipScanDate');
  const minForeign = document.getElementById('chipMinForeign').value;

  // 收集掃描清單：監控清單 + 常用股票 + 自訂輸入
  const watchCodes = watchlist.map(w => w.code);
  const quickCodes = ['2330','2317','2454','2367','6213','1802','3491'];
  const customInput = (document.getElementById('chipCustom')?.value || '')
    .split(/[,，\s]+/).filter(c => c.match(/^\d{4,6}$/));
  
  // 合併去重
  const allCodes = [...new Set([...watchCodes, ...quickCodes, ...customInput])];

  if (!allCodes.length) {
    results.innerHTML = '<div class="empty-text">請先新增監控清單或輸入股票代號</div>';
    return;
  }

  btn.disabled = true; btn.textContent = '掃描中';
  results.innerHTML = `<div class="empty-text">掃描 ${allCodes.length} 支股票中...</div>`;

  try {
    const res = await apiFetch(
      `${SERVER}/chip_scan?codes=${allCodes.join(',')}&min_foreign=${minForeign}`
    );
    const json = await res.json();
    const data = json.data || [];
    dateEl.textContent = json.note || '';

    if (!data.length) {
      results.innerHTML = '<div class="empty-text">無雙買超股票<br>（可增加監控清單擴大範圍）</div>';
      return;
    }

    results.innerHTML = data.map(d => `
      <div class="scan-item good" onclick="setStock('${d.code}')" style="flex-direction:column;align-items:flex-start;gap:2px;">
        <div style="display:flex;align-items:center;gap:6px;width:100%;">
          <span class="si-code">${d.code}</span>
          <span class="si-name">${d.name}</span>
          <span class="si-price" style="margin-left:auto;">${d.close > 0 ? '$' + d.close : '—'}</span>
        </div>
        <div style="display:flex;gap:6px;font-size:9px;">
          <span style="color:#378ADD;">外資 +${d.foreign_net.toLocaleString()}張</span>
          <span style="color:#E09020;">投信 +${d.trust_net.toLocaleString()}張</span>
          <span style="color:#639922;margin-left:auto;">合計 +${d.total_net.toLocaleString()}張</span>
        </div>
      </div>`).join('') +
      '<div style="font-size:9px;color:#bbb;margin-top:4px;">點擊查詢詳細</div>';

  } catch(e) {
    results.innerHTML = `<div class="empty-text">失敗：${e.message}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = '掃描';
  }
}

// 跳轉工具
function getPageBase() {
  return window.location.href.replace(/\/[^\/]*(\?.*)?$/, '');
}
function goToChips(code) {
  window.open(`${getPageBase()}/籌碼分析.html?code=${code}`, '_blank');
}
function goToABC(code) {
  localStorage.setItem('abc_jump_code', code);
  window.open(`${getPageBase()}/ABC選股掃描.html`, '_blank');
}

// 初始化
function init() {
  checkServer();
  loadNews();
  renderWatchlist();
  if (watchlist.length>0) refreshWatchlist();

  // ABC選股掃描跳轉
  const jumpCode = localStorage.getItem('abc_jump_code');
  if (jumpCode) {
    localStorage.removeItem('abc_jump_code');
    document.getElementById('stockInput').value = jumpCode;
    loadStock();
  }
}

if (localStorage.getItem('appToken') || sessionStorage.getItem('appToken')) init();
</script>
</body>
</html>
